<div class="relative">
  <button type="button" (click)="toggleMenu()" [attr.aria-label]="'common.language' | translate" [attr.aria-expanded]="open()" class="inline-flex items-center gap-2 rounded-full border border-border bg-card px-3 py-2 text-sm font-medium text-foreground transition-colors hover:bg-muted" >
    <svg class="h-4 w-4 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="10" />
      <path d="M2 12h20" />
      <path d="M12 2a15.3 15.3 0 0 1 0 20" />
      <path d="M12 2a15.3 15.3 0 0 0 0 20" />
    </svg>

    <span class="hidden sm:inline"> {{ currentDefinition().nativeLabel }} </span>

    <span class="text-xs font-bold uppercase tracking-wider text-muted-foreground sm:hidden"> {{ current() }}</span>
  </button>

  @if (open()) {
    <div class="absolute end-0 z-50 mt-2 w-48 overflow-hidden rounded-2xl border border-border bg-popover p-1.5 shadow-card">
      @for (lang of supported; track lang.code) {
        <button type="button" (click)="select(lang.code)" class="flex w-full items-center justify-between gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-foreground transition-colors hover:bg-muted" [class.bg-muted]="current() === lang.code">
          <span class="flex items-center gap-2">
            <span aria-hidden="true">{{ lang.flag }}</span>
            <span>{{ lang.nativeLabel }}</span>
          </span>

          @if (current() === lang.code) {
            <svg class="h-4 w-4 text-brand-deep" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 6L9 17l-5-5" />
            </svg>
          }
        </button>
      }
    </div>
  }
</div>
