<div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      @for (i of range(); track i) {
        <div class="rounded-3xl border border-border bg-card p-5 shadow-soft">
          <div class="flex items-start justify-between">
            <div class="h-12 w-12 animate-pulse rounded-2xl bg-muted"></div>
            <div class="h-4 w-16 animate-pulse rounded-full bg-muted"></div>
          </div>
          <div class="mt-5 h-4 w-3/4 animate-pulse rounded-md bg-muted"></div>
          <div class="mt-2 h-3 w-1/2 animate-pulse rounded-md bg-muted"></div>
          <div class="mt-4 flex gap-1.5">
            <div class="h-4 w-16 animate-pulse rounded-full bg-muted"></div>
            <div class="h-4 w-12 animate-pulse rounded-full bg-muted"></div>
            <div class="h-4 w-14 animate-pulse rounded-full bg-muted"></div>
          </div>
          <div class="mt-4 h-1.5 w-full animate-pulse rounded-full bg-muted"></div>
        </div>
      }
</div>
