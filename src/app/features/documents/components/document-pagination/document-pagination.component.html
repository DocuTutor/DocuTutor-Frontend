<nav class="flex flex-wrap items-center justify-between gap-3" [attr.aria-label]="'documents.pagination.label' | translate">
      <p class="text-xs text-muted-foreground">
        {{ 'documents.pagination.showing' | translate: { from: from(), to: to(), total: total() } }}
      </p>
      <div class="flex items-center gap-1">
        <button
          type="button"
          (click)="go(page() - 1)"
          [disabled]="page() === 1"
          class="grid h-9 w-9 place-items-center rounded-full border border-border bg-card text-muted-foreground transition-colors hover:bg-muted disabled:cursor-not-allowed disabled:opacity-40"
          [attr.aria-label]="'documents.pagination.previous' | translate"
        >
          <svg class="h-4 w-4 rtl:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        @for (p of pages(); track p) {
          <button
            type="button"
            (click)="go(p)"
            class="grid h-9 min-w-9 place-items-center rounded-full px-3 text-sm font-semibold transition-colors"
            [class]="p === page() ? 'bg-foreground text-background shadow-soft' : 'bg-card text-foreground border border-border hover:bg-muted'"
            [attr.aria-current]="p === page() ? 'page' : null"
          >
            {{ p }}
          </button>
        }

        <button
          type="button"
          (click)="go(page() + 1)"
          [disabled]="page() === totalPages()"
          class="grid h-9 w-9 place-items-center rounded-full border border-border bg-card text-muted-foreground transition-colors hover:bg-muted disabled:cursor-not-allowed disabled:opacity-40"
          [attr.aria-label]="'documents.pagination.next' | translate"
        >
          <svg class="h-4 w-4 rtl:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </nav>
