<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      @for (s of stats(); track s.key) {
        <div class="group rounded-3xl border border-border bg-card p-5 shadow-soft transition-all hover:-translate-y-1 hover:shadow-card">
          <div class="flex items-start justify-between">
            <span class="grid h-11 w-11 place-items-center rounded-2xl text-xl shadow-soft" [class]="s.tone">{{ s.icon }}</span>
          </div>
          <div class="mt-4 text-xs font-semibold uppercase tracking-wider text-muted-foreground">{{ s.labelKey | translate }}</div>
          <div class="mt-1 font-display text-3xl font-bold text-foreground">{{ s.value }}</div>
        </div>
      }
    </div>
