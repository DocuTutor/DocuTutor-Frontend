<div class="my-auto mx-auto w-full max-w-sm py-12">
  <div class="text-xs font-semibold uppercase tracking-wider text-brand">{{ 'auth.forgot.eyebrow' | translate }}</div>
  <h1 class="mt-2 font-display text-3xl font-bold leading-tight text-foreground sm:text-4xl">{{ 'auth.forgot.title' | translate }}</h1>
  <p class="mt-4 text-base leading-7 text-muted-foreground">{{ 'auth.forgot.subtitle' | translate }}</p>
    <form #resetForm="ngForm" (ngSubmit)="onSubmit(resetForm)" class="mt-10 space-y-6">

    <label class="block">
      <span class="text-sm font-medium text-foreground">{{ 'auth.forgot.email' | translate }}</span>

      <input type="email" name="email" [(ngModel)]="email" required email placeholder="you@university.edu" class="mt-3 w-full rounded-xl border border-input bg-background px-4 py-3 text-sm outline-none transition-all focus:border-brand focus:ring-4 focus:ring-brand/15" #emailModel="ngModel"/>

      @if ((emailModel.touched || resetForm.submitted) && emailModel.invalid) {
        <small class="text-red-500">
          @if (emailModel.errors?.['required']) {
            • Email is required
          }
          @if (emailModel.errors?.['email']) {
            • Enter a valid email
          }
        </small>
      }
    </label>

    <!-- SUCCESS MESSAGE -->
    @if (successMessage()) {
      <div class="text-green-600 text-sm text-center">
        {{ successMessage() }}
      </div>
    }

    <!-- ERROR MESSAGE -->
    @if (errorMessage()) {
      <div class="text-red-500 text-sm text-center">
        • {{ errorMessage() }}
      </div>
    }

    <!-- BUTTON -->
    <button
      type="submit"
      [disabled]="isLoading()"
      class="w-full rounded-full bg-foreground py-3 text-sm font-semibold text-background shadow-soft transition-all hover:-translate-y-0.5"
    >
      {{ (isLoading() ? 'auth.forgot.loading' : 'auth.forgot.submit') | translate }}
    </button>

    <!-- LOGIN LINK -->
    <div class="text-center text-sm text-gray-500">
      Remembered it?
      <a
        routerLink="/auth/login"
        class="font-semibold text-brand-deep hover:underline"
      >
        {{ 'auth.forgot.back' | translate }}
      </a>
    </div>

  </form>


</div>
