<div class="border-b border-border bg-card px-6 py-4 lg:px-10">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div class="flex min-w-0 items-center gap-3">
      <a routerLink="/dashboard" class="grid h-9 w-9 place-items-center rounded-full border border-border text-muted-foreground hover:bg-muted">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
      </a>

      <span class="grid h-10 w-10 place-items-center rounded-xl bg-gradient-to-br text-xl text-white shadow-soft" [class]="doc().color" > {{ doc().emoji }}</span>

      <div class="min-w-0">
        <div class="truncate font-display text-lg font-semibold text-foreground">{{ doc().title }}</div>
        <div class="text-xs text-muted-foreground">{{ doc().type }} · {{ doc().pages }} pages · indexed {{ doc().updatedAt }}</div>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <button class="rounded-full border border-border bg-card px-3 py-1.5 text-xs font-semibold text-foreground hover:bg-muted">⤓ Export</button>
      <button class="rounded-full border border-border bg-card px-3 py-1.5 text-xs font-semibold text-foreground hover:bg-muted"> ⋯ </button>
    </div>
  </div>
</div>
