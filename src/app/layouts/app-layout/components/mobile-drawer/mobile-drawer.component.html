<div class="fixed inset-0 z-[9999] md:hidden" [class.pointer-events-none]="!open()" role="dialog" aria-modal="true" [attr.aria-label]="'nav.mobileMenu' | translate">
  <div class="absolute inset-0 z-0 bg-foreground/50 backdrop-blur-sm transition-opacity duration-300" [class.opacity-100]="open()" [class.opacity-0]="!open()" (click)="requestClose()" aria-hidden="true" ></div>

  <aside #panel class="absolute top-0 z-10 flex h-full w-[85%] max-w-sm flex-col bg-background shadow-card transition-transform duration-300 ease-out" [ngClass]="isRtl() ? 'right-0 border-s border-border' : 'left-0 border-e border-border'" [style.transform]="transform()" tabindex="-1" [attr.aria-label]="'nav.mobileMenu' | translate" >
    <div class="flex items-center justify-between border-b border-border/60 px-5 py-4">
      <app-logo />

      <button type="button" (click)="requestClose()" class="grid h-9 w-9 place-items-center rounded-full text-muted-foreground transition-colors hover:bg-muted" [attr.aria-label]="'common.close' | translate">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true" >
          <path d="M6 6l12 12M18 6L6 18" />
        </svg>
      </button>
    </div>

    <nav class="flex-1 overflow-y-auto px-4 py-6" [attr.aria-label]="'nav.mobileMenu' | translate">
      <ul class="space-y-1">
        @for (link of links(); track link.fragment) {
          <li>
            <a [routerLink]="['/']" [fragment]="link.fragment" (click)="requestClose()" class="flex items-center rounded-2xl px-4 py-3 text-base font-medium text-foreground transition-colors hover:bg-muted">
              {{ link.labelKey | translate }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="border-t border-border/60 px-5 py-4">
      <div class="flex items-center justify-between gap-3">
        <span class="text-xs font-semibold uppercase tracking-wider text-muted-foreground">
          {{ 'common.language' | translate }}
        </span>

        <div class="flex items-center gap-2">
          <app-language-switcher />
          <app-theme-toggle />
        </div>
      </div>

      <div class="mt-4 grid grid-cols-2 gap-2">
        @if (isAuthenticated()) {
          <a routerLink="/dashboard" (click)="requestClose()" class="inline-flex items-center justify-center gap-1.5 rounded-full bg-foreground px-4 py-2 text-sm font-semibold text-background shadow-soft transition-all hover:-translate-y-0.5 hover:shadow-glow">
            <span>{{ 'nav.dashboard' | translate }}</span>
        </a>
          <app-logout />
        } @else {
          <a
            routerLink="/auth/login"
            (click)="requestClose()"
            class="inline-flex items-center justify-center rounded-full border border-border bg-card px-4 py-2.5 text-sm font-semibold text-foreground transition-colors hover:bg-muted"
          >
            {{ 'common.logIn' | translate }}
          </a>

          <a
            routerLink="/auth/register"
            (click)="requestClose()"
            class="inline-flex items-center justify-center rounded-full bg-foreground px-4 py-2.5 text-sm font-semibold text-background shadow-soft transition-all hover:shadow-glow"
          >
            {{ 'common.getStarted' | translate }}
          </a>
        }
      </div>
    </div>
  </aside>
</div>
