<header class="sticky top-0 z-30 border-b border-border bg-background/90 backdrop-blur-xl lg:hidden">
  <div class="flex h-16 items-center justify-between px-4">
    <button type="button" class="grid h-10 w-10 place-items-center rounded-full border border-border bg-card text-foreground transition-colors hover:bg-muted" [attr.aria-label]="'nav.openMenu' | translate" [attr.aria-expanded]="drawerOpen()" aria-controls="dashboard-mobile-drawer" aria-haspopup="dialog" (click)="menuClicked.emit()">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" />
      </svg>
    </button>

    <div class="flex-1 px-4">
      <div class="flex justify-center">
        <app-logo />
      </div>
    </div>

    <app-theme-toggle />
  </div>
</header>
