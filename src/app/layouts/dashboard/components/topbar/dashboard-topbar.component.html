<!-- Dashboard Topbar Navigation -->
<header class="topbar">
  <!-- Search Bar -->
  <div class="topbar-search">
    <input type="text" placeholder="Search documents..." class="search-input" />
    <span class="search-icon">🔍</span>
  </div>

  <!-- Right Actions -->
  <div class="topbar-actions">
    <!-- Notifications -->
    <button class="action-btn notification-btn" aria-label="Notifications">
      <span class="action-icon">🔔</span>
      <span class="notification-badge">3</span>
    </button>

    <!-- Theme Toggle -->
    <button class="action-btn theme-toggle" aria-label="Toggle theme">
      <span class="action-icon">🌙</span>
    </button>

    <!-- Help -->
    <button class="action-btn help-btn" aria-label="Help">
      <span class="action-icon">❓</span>
    </button>

    <!-- User Profile Dropdown -->
    <div class="user-profile">
      <button class="profile-btn" aria-label="User menu">
        <span class="profile-avatar">👤</span>
        <span class="profile-name">John Doe</span>
      </button>
      <!-- Dropdown menu would go here -->
    </div>
  </div>
</header>
