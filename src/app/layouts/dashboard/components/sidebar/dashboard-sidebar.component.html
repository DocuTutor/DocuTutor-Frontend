<aside class="sticky top-0 hidden h-screen w-64 shrink-0 flex-col border-r border-border bg-sidebar p-5 lg:flex">
  <div class="flex items-center justify-between">
    <app-logo />
    <app-theme-toggle />
  </div>

  <a
    routerLink="/app/upload"
    class="mt-7 inline-flex items-center justify-center gap-2 rounded-full bg-foreground py-2.5 text-sm font-semibold text-background shadow-soft transition-all hover:-translate-y-0.5 hover:shadow-glow"
  >
    <svg
      class="h-4 w-4"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
    >
      <path d="M12 5v14M5 12h14" />
    </svg>
    New document
  </a>

  <nav class="mt-8 space-y-1">
    <div class="px-3 pb-2 text-[10px] font-bold uppercase tracking-wider text-muted-foreground">
      Workspace
    </div>

    @for (item of nav; track item.to) {
      <a
        [routerLink]="item.to"
        routerLinkActive="bg-brand-deep text-white shadow-soft"
        [routerLinkActiveOptions]="{ exact: !!item.exact }"
        class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-foreground transition-colors hover:bg-sidebar-accent"
      >
        <span class="text-base">{{ item.icon }}</span>
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="mt-8 px-3 text-[10px] font-bold uppercase tracking-wider text-muted-foreground">
    Plan
  </div>

  <div class="mt-2 rounded-2xl bg-gradient-to-br from-brand-deep to-brand p-4 text-white">
    <div class="text-xs uppercase tracking-wider text-white/70">Free plan</div>
    <div class="mt-1 font-display text-lg font-bold">2 / 3 documents</div>

    <div class="mt-3 h-1.5 overflow-hidden rounded-full bg-white/20">
      <div class="h-full w-2/3 rounded-full bg-warning"></div>
    </div>

    <a
      routerLink="/pricing"
      class="mt-3 inline-flex w-full justify-center rounded-full bg-white py-2 text-xs font-semibold text-brand-deep"
    >
      Upgrade to Pro
    </a>
  </div>

  <div class="mt-auto flex items-center gap-3 rounded-2xl border border-border bg-card p-3">
    <span class="grid h-9 w-9 place-items-center rounded-full bg-brand-soft text-sm font-bold text-brand-deep">
      MR
    </span>

    <div class="flex-1 text-sm">
      <div class="font-semibold text-foreground">Maya R.</div>
      <div class="text-xs text-muted-foreground">maya&#64;stanford.edu</div>
    </div>
  </div>
</aside>
